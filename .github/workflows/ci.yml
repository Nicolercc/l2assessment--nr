name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  eval:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.GROQ_API_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run triage eval
        env:
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run eval
      - name: Eval summary
        if: always()
        run: echo "Eval job finished — see logs above for Urgency/Category score."
